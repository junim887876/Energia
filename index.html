<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    solarInSolar Invest</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.6);
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --glow: 0 0 20px rgba(10, 132, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation; /* Evita comportamentos indesejados de toque */
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            color: #86868b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: var(--text-color);
            font-size: 32px;
            padding: 10px 0;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom-color: var(--accent-color);
        }

        .result-group {
            margin-bottom: 20px;
        }

        .result-value {
            font-size: 42px;
            font-weight: bold;
            color: #32d74b; /* Verde estilo Apple */
        }

        /* O Ponto Escondido */
        .secret-dot {
            width: 15px;
            height: 15px;
            background-color: #1c1c1e; /* Quase invisível no fundo preto */
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
            right: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .secret-dot:active {
            background-color: var(--accent-color);
        }

        /* Área de Lucro Escondida */
        .profit-area {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
            animation: fadeIn 0.3s ease;
        }

        .profit-value {
            font-size: 24px;
            color: #ff9f0a; /* Laranja */
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="input-group">
            <label>Valor de Entrada</label>
            <input type="text" id="valorInput" inputmode="decimal" placeholder="0,00" autocomplete="off">
        </div>

        <div class="result-group">
            <label>Com Desconto (20%)</label>
            <div class="result-value" id="valorDesconto">R$ 0,00</div>
        </div>

        <div class="profit-area" id="profitArea">
            <label>Margem (Oculta)</label>
            <div class="profit-value" id="valorLucro">R$ 0,00</div>
        </div>

        <div class="secret-dot" id="secretDot" onclick="toggleProfit()"></div>
    </div>

    <script>
        const input = document.getElementById('valorInput');
        const displayDesconto = document.getElementById('valorDesconto');
        const displayLucro = document.getElementById('valorLucro');
        const profitArea = document.getElementById('profitArea');

        // Função para formatar em Reais (BRL)
        const formatarMoeda = (valor) => {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        input.addEventListener('input', function(e) {
            // Remove tudo que não for número ou vírgula
            let val = this.value.replace(/[^0-9,]/g, '');
            
            // Impede mais de uma vírgula
            const partes = val.split(',');
            if (partes.length > 2) {
                val = partes[0] + ',' + partes.slice(1).join('');
            }
            
            this.value = val;

            // Troca a vírgula por ponto para fazer os cálculos no JavaScript
            let numero = parseFloat(val.replace(',', '.')) || 0;

            // Cálculos
            // 1. Tira 20% do valor escrito
            let valorComDesconto = numero * 0.80; 

            // 2. Calcula o custo da operação (Valor Escrito * 0.175 + 21)
            let custo = (numero * 0.175) + 21;

            // 3. Lucro = Valor com Desconto - Custo
            let lucro = valorComDesconto - custo;

            // Atualiza a tela
            displayDesconto.textContent = formatarMoeda(valorComDesconto);
            displayLucro.textContent = formatarMoeda(lucro);
        });

        // Função para revelar/esconder a área de lucro ao clicar na bolinha
        function toggleProfit() {
            if (profitArea.style.display === 'block') {
                profitArea.style.display = 'none';
            } else {
                profitArea.style.display = 'block';
            }
        }
    </script>
</body>
</html>
